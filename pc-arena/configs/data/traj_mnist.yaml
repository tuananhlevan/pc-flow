target: src.data.DataModuleFromConfig
params:
  batch_size: 64
  num_workers: 0
  drop_last: true
  pin_memory: true
  # Optional: Limit the number of training samples
  # sampler: __subset__:20000
  train:
    target: src.data.traj_mnist.TrajMNIST
    params:
      root: data/TrajMNIST/
      train: true
  validation:
    target: src.data.traj_mnist.TrajMNIST
    params:
      root: data/TrajMNIST/
      train: false
  # Add transformations if your tensors need to be quantized or reshaped dynamically
  transform_fns:
    - target: src.transforms.Flatten